openapi: 3.1.0
info:
  description: Send push notifications and Live Activities to your own devices via
    a single API key.
  title: ActivitySmith API
  version: 1.0.0
servers:
- url: https://activitysmith.com/api
security:
- apiKeyAuth: []
tags:
- description: Send push notifications to paired devices.
  name: PushNotifications
- description: "Start, update, stream, and end Live Activities."
  name: LiveActivities
- description: Update metric values shown in ActivitySmith widgets.
  name: Metrics
paths:
  /push-notification:
    post:
      description: "Sends a push notification to devices matched by API key scope\
        \ and optional target channels. Supports optional redirection URL, optional\
        \ media preview or playback when the notification is expanded, and up to 4\
        \ interactive actions. `media` cannot be combined with `actions`."
      operationId: sendPushNotification
      requestBody:
        content:
          application/json:
            examples:
              default:
                value:
                  title: New subscription 💸
                  message: Customer upgraded to Pro plan
              channel_targeted:
                value:
                  title: New subscription 💸
                  message: Customer upgraded to Pro plan
                  target:
                    channels:
                    - devs
                    - ops
              redirection:
                value:
                  title: Incident Resolved ✅
                  message: All systems operational
                  redirection: https://status.example.com/incidents/abc-123
              media_preview:
                value:
                  title: Homepage ready
                  message: Your agent finished the redesign.
                  media: https://cdn.example.com/output/homepage.png
              media_preview_with_redirection:
                value:
                  title: Homepage ready
                  message: Your agent finished the redesign.
                  media: https://cdn.example.com/output/homepage.png
                  redirection: https://github.com/acme/web/pull/482
              actions_open_url:
                value:
                  title: Release Candidate Ready 🚀
                  message: v2.14.0-rc.1 deployed to staging
                  actions:
                  - title: View CI Run
                    type: open_url
                    url: https://github.com/activitysmithhq/backend/actions/runs/1234567890
                  - title: Release Notes
                    type: open_url
                    url: https://github.com/activitysmithhq/backend/releases/tag/v2.14.0-rc.1
              actions_webhook:
                value:
                  title: Build Failed 🚨
                  message: Tap and hold for remediation actions
                  redirection: https://ci.example.com/builds/8842
                  actions:
                  - title: Retry Build
                    type: webhook
                    url: https://hooks.example.com/activitysmith/build-retry
                    method: POST
                    body:
                      build_id: "8842"
                      source: push_action
            schema:
              $ref: '#/components/schemas/PushNotificationRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                default:
                  value:
                    success: true
                    devices_notified: 2
                    users_notified: 1
                    timestamp: 2025-08-12T12:00:00.000Z
                channel_targeted:
                  value:
                    success: true
                    devices_notified: 2
                    users_notified: 1
                    effective_channel_slugs:
                    - devs
                    - ops
                    timestamp: 2025-08-12T12:00:00.000Z
              schema:
                $ref: '#/components/schemas/PushNotificationResponse'
          description: Push notification sent
        "400":
          content:
            application/json:
              examples:
                invalid_target:
                  value:
                    error: Invalid channel targeting
                    message: target.channels must be an array of channel slugs
              schema:
                $ref: '#/components/schemas/BadRequestError'
          description: Bad request (invalid payload or channel targeting input)
        "403":
          content:
            application/json:
              examples:
                channel_scope_violation:
                  value:
                    error: Invalid channel targeting
                    message: This API key can only target assigned channels. Requested
                      channels include channels outside this key scope.
              schema:
                $ref: '#/components/schemas/ForbiddenError'
          description: Forbidden (API key scope or channel assignment violation)
        "404":
          content:
            application/json:
              examples:
                no_devices:
                  value:
                    error: No recipients found
                    message: No devices matched the effective channel target
                    effective_channel_slugs:
                    - marketing
              schema:
                $ref: '#/components/schemas/NoRecipientsError'
          description: No recipients found for effective channel target
        "429":
          content:
            application/json:
              examples:
                rate_limited:
                  value:
                    error: Rate limit exceeded
                    message: "Too many requests, please try again later."
              schema:
                $ref: '#/components/schemas/sendPushNotification_429_response'
          description: Rate limit exceeded
      summary: Send a push notification
      tags:
      - PushNotifications
      x-codeSamples:
      - lang: javascript
        label: Node
        source: |-
          import ActivitySmith from "activitysmith";

          const activitysmith = new ActivitySmith({
            apiKey: process.env.ACTIVITYSMITH_API_KEY,
          });

          await activitysmith.notifications.send({
            title: "New subscription 💸",
            message: "Customer upgraded to Pro plan",
          });
      - lang: python
        label: Python
        source: |-
          import os
          from activitysmith import ActivitySmith

          activitysmith = ActivitySmith(api_key=os.environ["ACTIVITYSMITH_API_KEY"])

          activitysmith.notifications.send({
              "title": "New subscription 💸",
              "message": "Customer upgraded to Pro plan",
          })
      - lang: go
        label: Go
        source: "package main\n\nimport (\n\t\"log\"\n\n\tactivitysmithsdk \"github.com/ActivitySmithHQ/activitysmith-go\"\
          \n)\n\nfunc main() {\n\tactivitysmith, err := activitysmithsdk.New(\"YOUR-API-KEY\"\
          )\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\n\t_, err = activitysmith.Notifications.Send(activitysmithsdk.PushNotificationInput{\n\
          \t\tTitle:   \"New subscription 💸\",\n\t\tMessage: \"Customer upgraded\
          \ to Pro plan\",\n\t})\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n}"
      - lang: php
        label: PHP
        source: |-
          <?php

          use ActivitySmith\ActivitySmith;

          $activitysmith = new ActivitySmith($_ENV['ACTIVITYSMITH_API_KEY']);

          $activitysmith->notifications->send([
              'title' => 'New subscription 💸',
              'message' => 'Customer upgraded to Pro plan',
          ]);
      - lang: ruby
        label: Ruby
        source: |-
          require "activitysmith"

          activitysmith = ActivitySmith::Client.new(api_key: ENV.fetch("ACTIVITYSMITH_API_KEY"))

          activitysmith.notifications.send(
            title: "New subscription 💸",
            message: "Customer upgraded to Pro plan"
          )
      - lang: bash
        label: cURL
        source: |-
          curl -X POST "https://activitysmith.com/api/push-notification" \
            -H "Authorization: Bearer $ACTIVITYSMITH_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "New subscription 💸",
              "message": "Customer upgraded to Pro plan"
            }'
  /live-activity/stream/{stream_key}:
    delete:
      description: "Use this endpoint when the process you are tracking is finished\
        \ and you no longer want the Live Activity on your devices. ActivitySmith\
        \ ends the current Live Activity for this stream and dismisses it from devices.\
        \ If you need direct lifecycle control, use /live-activity/start, /live-activity/update,\
        \ and /live-activity/end instead."
      operationId: endLiveActivityStream
      parameters:
      - description: "Stable identifier for one ongoing thing. Allowed characters:\
          \ letters, numbers, underscores, and hyphens."
        explode: false
        in: path
        name: stream_key
        required: true
        schema:
          maxLength: 255
          pattern: "^[A-Za-z0-9_-]+$"
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              default:
                value: {}
              with_content_state:
                value:
                  content_state:
                    title: Server Health
                    subtitle: prod-web-1
                    type: metrics
                    metrics:
                    - label: CPU
                      value: 0
                      unit: '%'
                    - label: MEM
                      value: 0
                      unit: '%'
                    auto_dismiss_minutes: 2
            schema:
              $ref: '#/components/schemas/LiveActivityStreamDeleteRequest'
        required: false
      responses:
        "200":
          content:
            application/json:
              examples:
                ended:
                  value:
                    success: true
                    operation: ended
                    stream_key: linode-vps
                    activity_id: h8QmSyYFTuwOIF6Wh3YcZlzHLhUcr034
                    devices_queued: 1
                    timestamp: 2025-08-12T12:10:00.000Z
                already_inactive:
                  value:
                    success: true
                    operation: ended
                    stream_key: linode-vps
                    activity_id: null
                    timestamp: 2025-08-12T12:10:00.000Z
              schema:
                $ref: '#/components/schemas/LiveActivityStreamDeleteResponse'
          description: Managed stream ended
        "400":
          content:
            application/json:
              examples:
                invalid_stream_key:
                  value:
                    error: Invalid stream_key
                    message: "stream_key must contain only letters, numbers, underscores,\
                      \ and hyphens"
              schema:
                $ref: '#/components/schemas/BadRequestError'
          description: Bad request (invalid stream_key or action)
        "404":
          content:
            application/json:
              examples:
                not_found:
                  value:
                    error: Live Activity stream not found
                    message: "No Live Activity stream found for stream_key: linode-vps"
              schema:
                $ref: '#/components/schemas/NotFoundError'
          description: Managed stream not found
        "429":
          content:
            application/json:
              examples:
                rate_limited:
                  value:
                    error: Rate limit exceeded
                    message: "Too many requests, please try again later."
              schema:
                $ref: '#/components/schemas/RateLimitError'
          description: Rate limit exceeded
      summary: End a stream
      tags:
      - LiveActivities
      x-codeSamples:
      - lang: javascript
        label: Node
        source: |-
          import ActivitySmith from "activitysmith";

          const activitysmith = new ActivitySmith({
            apiKey: process.env.ACTIVITYSMITH_API_KEY,
          });

          await activitysmith.liveActivities.endStream("prod-web-1", {
            content_state: {
              title: "Server Health",
              subtitle: "prod-web-1",
              type: "metrics",
              metrics: [
                { label: "CPU", value: 7, unit: "%" },
                { label: "MEM", value: 38, unit: "%" },
              ],
            },
          });
      - lang: python
        label: Python
        source: |-
          import os
          from activitysmith import ActivitySmith

          activitysmith = ActivitySmith(api_key=os.environ["ACTIVITYSMITH_API_KEY"])

          activitysmith.live_activities.end_stream(
              "prod-web-1",
              {
                  "content_state": {
                      "title": "Server Health",
                      "subtitle": "prod-web-1",
                      "type": "metrics",
                      "metrics": [
                          {"label": "CPU", "value": 7, "unit": "%"},
                          {"label": "MEM", "value": 38, "unit": "%"},
                      ],
                  },
              },
          )
      - lang: go
        label: Go
        source: "package main\n\nimport (\n\t\"log\"\n\n\tactivitysmithsdk \"github.com/ActivitySmithHQ/activitysmith-go\"\
          \n\t\"github.com/ActivitySmithHQ/activitysmith-go/generated\"\n)\n\nfunc\
          \ main() {\n\tactivitysmith, err := activitysmithsdk.New(\"YOUR-API-KEY\"\
          )\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\n\t_, err = activitysmith.LiveActivities.EndStream(\"\
          prod-web-1\", activitysmithsdk.LiveActivityStreamEndInput{\n\t\tTitle: \
          \   \"Server Health\",\n\t\tSubtitle: \"prod-web-1\",\n\t\tType:     \"\
          metrics\",\n\t\tMetrics: []generated.ActivityMetric{\n\t\t\t{Label: \"CPU\"\
          , Value: 7, Unit: generated.PtrString(\"%\")},\n\t\t\t{Label: \"MEM\", Value:\
          \ 38, Unit: generated.PtrString(\"%\")},\n\t\t},\n\t})\n\tif err != nil\
          \ {\n\t\tlog.Fatal(err)\n\t}\n}"
      - lang: php
        label: PHP
        source: |-
          <?php

          use ActivitySmith\ActivitySmith;

          $activitysmith = new ActivitySmith($_ENV['ACTIVITYSMITH_API_KEY']);

          $activitysmith->liveActivities->endStream('prod-web-1', [
              'content_state' => [
                  'title' => 'Server Health',
                  'subtitle' => 'prod-web-1',
                  'type' => 'metrics',
                  'metrics' => [
                      ['label' => 'CPU', 'value' => 7, 'unit' => '%'],
                      ['label' => 'MEM', 'value' => 38, 'unit' => '%'],
                  ],
              ],
          ]);
      - lang: ruby
        label: Ruby
        source: |-
          require "activitysmith"

          activitysmith = ActivitySmith::Client.new(api_key: ENV.fetch("ACTIVITYSMITH_API_KEY"))

          activitysmith.live_activities.end_stream(
            "prod-web-1",
            {
              content_state: {
                title: "Server Health",
                subtitle: "prod-web-1",
                type: "metrics",
                metrics: [
                  { label: "CPU", value: 7, unit: "%" },
                  { label: "MEM", value: 38, unit: "%" }
                ]
              }
            }
          )
      - lang: bash
        label: cURL
        source: |-
          curl -X DELETE "https://activitysmith.com/api/live-activity/stream/prod-web-1" \
            -H "Authorization: Bearer $ACTIVITYSMITH_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "content_state": {
                "title": "Server Health",
                "subtitle": "prod-web-1",
                "type": "metrics",
                "metrics": [
                  { "label": "CPU", "value": 7, "unit": "%" },
                  { "label": "MEM", "value": 38, "unit": "%" }
                ]
              }
            }'
    put:
      description: "Use a stable stream_key for each ongoing thing you want to show\
        \ as a Live Activity. Send the latest content_state whenever it changes, and\
        \ ActivitySmith will keep the Live Activity in sync."
      operationId: reconcileLiveActivityStream
      parameters:
      - description: "Stable identifier for one ongoing thing. Allowed characters:\
          \ letters, numbers, underscores, and hyphens."
        explode: false
        in: path
        name: stream_key
        required: true
        schema:
          maxLength: 255
          pattern: "^[A-Za-z0-9_-]+$"
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              metrics:
                value:
                  content_state:
                    title: Server Health
                    subtitle: prod-web-1
                    type: metrics
                    metrics:
                    - label: CPU
                      value: 27
                      unit: '%'
                    - label: MEM
                      value: 64
                      unit: '%'
              channel_targeted:
                value:
                  channels:
                  - ops
                  content_state:
                    title: Server Health
                    subtitle: prod-web-1
                    type: metrics
                    metrics:
                    - label: CPU
                      value: 27
                      unit: '%'
                    - label: MEM
                      value: 64
                      unit: '%'
            schema:
              $ref: '#/components/schemas/LiveActivityStreamRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                started:
                  value:
                    success: true
                    operation: started
                    stream_key: linode-vps
                    activity_id: h8QmSyYFTuwOIF6Wh3YcZlzHLhUcr034
                    devices_notified: 2
                    timestamp: 2025-08-12T12:00:00.000Z
                noop:
                  value:
                    success: true
                    operation: noop
                    stream_key: linode-vps
                    activity_id: h8QmSyYFTuwOIF6Wh3YcZlzHLhUcr034
                    timestamp: 2025-08-12T12:05:00.000Z
                paused:
                  value:
                    success: true
                    operation: paused
                    stream_key: linode-vps
                    activity_id: null
                    timestamp: 2025-08-12T12:10:00.000Z
              schema:
                $ref: '#/components/schemas/LiveActivityStreamPutResponse'
          description: Stream reconciled
        "400":
          content:
            application/json:
              examples:
                invalid_stream_key:
                  value:
                    error: Invalid stream_key
                    message: "stream_key must contain only letters, numbers, underscores,\
                      \ and hyphens"
                invalid_target:
                  value:
                    error: Invalid channel targeting
                    message: channels must contain at least one channel
              schema:
                $ref: '#/components/schemas/BadRequestError'
          description: "Bad request (invalid stream_key, payload, action, or channel\
            \ targeting input)"
        "403":
          content:
            application/json:
              examples:
                channel_scope_violation:
                  value:
                    error: Invalid channel targeting
                    message: This API key can only target assigned channels. Requested
                      channels include channels outside this key scope.
              schema:
                $ref: '#/components/schemas/ForbiddenError'
          description: Forbidden (API key scope or channel assignment violation)
        "404":
          content:
            application/json:
              examples:
                no_devices:
                  value:
                    error: No recipients found
                    message: No Live Activity devices matched the effective channel
                      target
                    effective_channel_slugs:
                    - ops
              schema:
                $ref: '#/components/schemas/NoRecipientsError'
          description: No recipients found for effective channel target
        "429":
          content:
            application/json:
              examples:
                rate_limited:
                  value:
                    error: Rate limit exceeded
                    message: "Too many requests, please try again later."
                concurrent_live_activity_limit_reached:
                  value:
                    error: Live Activity limit reached
                    message: Only 4 concurrent Live Activities are allowed per account
                    limit: 4
                    active: 4
              schema:
                $ref: '#/components/schemas/sendPushNotification_429_response'
          description: Rate limit exceeded
      summary: Start a new Live Activity or update an existing one
      tags:
      - LiveActivities
      x-activitysmith-lifecycle: recommended_managed
      x-codeSamples:
      - lang: javascript
        label: Node
        source: |-
          import ActivitySmith from "activitysmith";

          const activitysmith = new ActivitySmith({
            apiKey: process.env.ACTIVITYSMITH_API_KEY,
          });

          await activitysmith.liveActivities.stream("search-reindex", {
            content_state: {
              title: "Search Reindex",
              subtitle: "catalog-v2",
              type: "progress",
              percentage: 42,
            },
          });
      - lang: python
        label: Python
        source: |-
          import os
          from activitysmith import ActivitySmith

          activitysmith = ActivitySmith(api_key=os.environ["ACTIVITYSMITH_API_KEY"])

          activitysmith.live_activities.stream(
              "search-reindex",
              {
                  "content_state": {
                      "title": "Search Reindex",
                      "subtitle": "catalog-v2",
                      "type": "progress",
                      "percentage": 42,
                  },
              },
          )
      - lang: go
        label: Go
        source: "package main\n\nimport (\n\t\"log\"\n\n\tactivitysmithsdk \"github.com/ActivitySmithHQ/activitysmith-go\"\
          \n)\n\nfunc main() {\n\tactivitysmith, err := activitysmithsdk.New(\"YOUR-API-KEY\"\
          )\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\n\t_, err = activitysmith.LiveActivities.Stream(\"\
          search-reindex\", activitysmithsdk.LiveActivityStreamInput{\n\t\tTitle:\
          \      \"Search Reindex\",\n\t\tSubtitle:   \"catalog-v2\",\n\t\tType: \
          \      \"progress\",\n\t\tPercentage: 42,\n\t})\n\tif err != nil {\n\t\t\
          log.Fatal(err)\n\t}\n}"
      - lang: php
        label: PHP
        source: |-
          <?php

          use ActivitySmith\ActivitySmith;

          $activitysmith = new ActivitySmith($_ENV['ACTIVITYSMITH_API_KEY']);

          $activitysmith->liveActivities->stream('search-reindex', [
              'content_state' => [
                  'title' => 'Search Reindex',
                  'subtitle' => 'catalog-v2',
                  'type' => 'progress',
                  'percentage' => 42,
              ],
          ]);
      - lang: ruby
        label: Ruby
        source: |-
          require "activitysmith"

          activitysmith = ActivitySmith::Client.new(api_key: ENV.fetch("ACTIVITYSMITH_API_KEY"))

          activitysmith.live_activities.stream(
            "search-reindex",
            content_state: {
              title: "Search Reindex",
              subtitle: "catalog-v2",
              type: "progress",
              percentage: 42
            }
          )
      - lang: bash
        label: cURL
        source: |-
          curl -X PUT "https://activitysmith.com/api/live-activity/stream/search-reindex" \
            -H "Authorization: Bearer $ACTIVITYSMITH_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "content_state": {
                "title": "Search Reindex",
                "subtitle": "catalog-v2",
                "type": "progress",
                "percentage": 42
              }
            }'
  /live-activity/start:
    post:
      description: "Legacy manual lifecycle endpoint. For new integrations, use PUT\
        \ /live-activity/stream/{stream_key} so ActivitySmith can manage start, update,\
        \ rotation, and end state for you. This endpoint remains supported for existing\
        \ integrations and advanced lifecycle control. Starts a Live Activity on devices\
        \ matched by API key scope and optional target channels. Supports segmented_progress,\
        \ progress, metrics, and stats activity types. For segmented_progress activities,\
        \ number_of_steps can be changed later during update or end calls if the workflow\
        \ changes."
      operationId: startLiveActivity
      requestBody:
        content:
          application/json:
            examples:
              segmented_progress:
                value:
                  content_state:
                    title: Nightly database backup
                    subtitle: create snapshot
                    number_of_steps: 3
                    current_step: 1
                    type: segmented_progress
                    color: yellow
              progress:
                value:
                  content_state:
                    title: EV Charging
                    subtitle: Added 30 mi range
                    percentage: 15
                    type: progress
                    color: lime
              metrics:
                value:
                  content_state:
                    title: Server Health
                    subtitle: prod-web-1
                    type: metrics
                    metrics:
                    - label: CPU
                      value: 21
                      unit: '%'
                    - label: MEM
                      value: 64
                      unit: '%'
              open_url_action:
                value:
                  content_state:
                    title: Deploying payments-api
                    subtitle: Running database migrations
                    number_of_steps: 5
                    current_step: 3
                    type: segmented_progress
                  action:
                    title: Open Workflow
                    type: open_url
                    url: https://github.com/acme/payments-api/actions/runs/1234567890
              segmented_progress_channel_targeted:
                value:
                  content_state:
                    title: Nightly database backup
                    subtitle: create snapshot
                    number_of_steps: 3
                    current_step: 1
                    type: segmented_progress
                    color: yellow
                  target:
                    channels:
                    - devs
                    - ops
            schema:
              $ref: '#/components/schemas/LiveActivityStartRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                segmented_progress:
                  value:
                    success: true
                    activity_id: pLAr-Hnq9ZFW4sxlk43Lhbuok4GLh7UW
                    devices_notified: 2
                    users_notified: 1
                    timestamp: 2026-01-28T09:57:22.929Z
                segmented_progress_channel_targeted:
                  value:
                    success: true
                    activity_id: pLAr-Hnq9ZFW4sxlk43Lhbuok4GLh7UW
                    devices_notified: 2
                    users_notified: 1
                    effective_channel_slugs:
                    - devs
                    - ops
                    timestamp: 2026-01-28T09:57:22.929Z
              schema:
                $ref: '#/components/schemas/LiveActivityStartResponse'
          description: Live Activity started
        "400":
          content:
            application/json:
              examples:
                invalid_target:
                  value:
                    error: Invalid channel targeting
                    message: target.channels must be an array of channel slugs
              schema:
                $ref: '#/components/schemas/BadRequestError'
          description: Bad request (invalid payload or channel targeting input)
        "403":
          content:
            application/json:
              examples:
                channel_scope_violation:
                  value:
                    error: Invalid channel targeting
                    message: This API key can only target assigned channels. Requested
                      channels include channels outside this key scope.
              schema:
                $ref: '#/components/schemas/ForbiddenError'
          description: Forbidden (API key scope or channel assignment violation)
        "404":
          content:
            application/json:
              examples:
                no_devices:
                  value:
                    error: No recipients found
                    message: No Live Activity devices matched the effective channel
                      target
                    effective_channel_slugs:
                    - marketing
              schema:
                $ref: '#/components/schemas/NoRecipientsError'
          description: No recipients found for effective channel target
        "429":
          content:
            application/json:
              examples:
                rate_limited:
                  value:
                    error: Rate limit exceeded
                    message: "Too many requests, please try again later."
                concurrent_live_activity_limit_reached:
                  value:
                    error: Live Activity limit reached
                    message: Only 4 concurrent Live Activities are allowed per account
                    limit: 4
                    active: 4
              schema:
                $ref: '#/components/schemas/sendPushNotification_429_response'
          description: Rate limit exceeded
      summary: Start a Live Activity (legacy manual lifecycle)
      tags:
      - LiveActivities
      x-activitysmith-lifecycle: legacy_manual
      x-activitysmith-recommended-alternative: "PUT /live-activity/stream/{stream_key}"
      x-codeSamples:
      - lang: javascript
        label: Node
        source: |-
