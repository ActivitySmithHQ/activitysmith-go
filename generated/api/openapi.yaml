components:
  schemas:
    ContentStateStart:
      additionalProperties: true
      description: "Start payload requires title and type. For segmented_progress\
        \ include number_of_steps and current_step. For progress include percentage\
        \ or value with upper_limit. For metrics and stats include a non-empty metrics\
        \ array. For segmented_progress, number_of_steps is not locked and can be\
        \ changed in later update or end calls."
      example:
        color: blue
        step_color: lime
        step_colors:
        - lime
        - lime
        subtitle: subtitle
        percentage: 14.658129805029452
        upper_limit: 5.637376656633329
        metrics:
        - unit: unit
          color: lime
          label: label
          value: 0.23021358869347652
        - unit: unit
          color: lime
          label: label
          value: 0.23021358869347652
        - unit: unit
          color: lime
          label: label
          value: 0.23021358869347652
        - unit: unit
          color: lime
          label: label
          value: 0.23021358869347652
        - unit: unit
          color: lime
          label: label
          value: 0.23021358869347652
        title: title
        number_of_steps: 1
        type: segmented_progress
        value: 5.962133916683182
        current_step: 1
      properties:
        title:
          type: string
        subtitle:
          type: string
        number_of_steps:
          description: Total number of steps. Use for type=segmented_progress. This
            value can be increased or decreased later when updating or ending the
            same activity.
          minimum: 1
          type: integer
        current_step:
          description: Current step. Use for type=segmented_progress.
          minimum: 1
          type: integer
        percentage:
          description: Progress percentage (0–100). Use for type=progress. Takes precedence
            over value/upper_limit if both are provided.
          maximum: 100
          minimum: 0
          type: number
        value:
          description: Current progress value. Use with upper_limit for type=progress.
          type: number
        upper_limit:
          description: Maximum progress value. Use with value for type=progress.
          type: number
        metrics:
          description: Use for type=metrics or type=stats.
          items:
            $ref: '#/components/schemas/ActivityMetric'
          maxItems: 8
          minItems: 1
          type: array
        type:
          enum:
          - segmented_progress
          - progress
          - metrics
          - stats
          type: string
        color:
          default: blue
          description: Optional. Accent color for the Live Activity. Defaults to blue.
          enum:
          - lime
          - green
          - cyan
          - blue
          - purple
          - magenta
          - red
          - orange
          - yellow
          type: string
        step_color:
          description: Optional. Overrides color for the current step. Only applies
            to type=segmented_progress.
          enum:
          - lime
          - green
          - cyan
          - blue
          - purple
          - magenta
          - red
          - orange
          - yellow
          type: string
        step_colors:
          description: "Optional. Colors for completed steps. When used with segmented_progress,\
            \ the array length should match current_step."
          items:
            enum:
            - lime
            - green
            - cyan
            - blue
            - purple
            - magenta
            - red
            - orange
            - yellow
            type: string
          type: array
      required:
      - title
      - type
    ContentStateUpdate:
      additionalProperties: true
      description: Update payload requires title. For segmented_progress include current_step
        and optionally number_of_steps. For progress include percentage or value with
        upper_limit. For metrics and stats include a non-empty metrics array. Type
        is optional when updating an existing activity. You can increase or decrease
        number_of_steps during updates.
      example:
        color: blue
        step_color: lime
        step_colors:
        - lime
        - lime
        subtitle: subtitle
        percentage: 14.658129805029452
        upper_limit: 5.637376656633329
        metrics:
        - unit: unit
          color: lime
          label: label
          value: 0.23021358869347652
