openapi: 3.1.0
info:
  description: Send push notifications and Live Activities to your own devices via
    a single API key.
  title: ActivitySmith API
  version: 1.0.0
servers:
- url: https://activitysmith.com/api
security:
- apiKeyAuth: []
tags:
- name: PushNotifications
- name: LiveActivities
paths:
  /push-notification:
    post:
      description: Sends a push notification to devices matched by API key scope and
        optional target channels. Supports optional redirection URL (tap) and up to
        4 interactive actions (long-press on iOS).
      operationId: sendPushNotification
      requestBody:
        content:
          application/json:
            examples:
              default:
                value:
                  title: New subscription 💸
                  message: Customer upgraded to Pro plan
              channel_targeted:
                value:
                  title: New subscription 💸
                  message: Customer upgraded to Pro plan
                  target:
                    channels:
                    - devs
                    - ops
              redirection:
                value:
                  title: Incident Resolved ✅
                  message: All systems operational
                  redirection: https://status.example.com/incidents/abc-123
              actions_open_url:
                value:
                  title: Release Candidate Ready 🚀
                  message: v2.14.0-rc.1 deployed to staging
                  actions:
                  - title: View CI Run
                    type: open_url
                    url: https://github.com/activitysmithhq/backend/actions/runs/1234567890
                  - title: Release Notes
                    type: open_url
                    url: https://github.com/activitysmithhq/backend/releases/tag/v2.14.0-rc.1
              actions_webhook:
                value:
                  title: Build Failed 🚨
                  message: Tap and hold for remediation actions
                  redirection: https://ci.example.com/builds/8842
                  actions:
                  - title: Retry Build
                    type: webhook
                    url: https://hooks.example.com/activitysmith/build-retry
                    method: POST
                    body:
                      build_id: "8842"
                      source: push_action
            schema:
              $ref: '#/components/schemas/PushNotificationRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                default:
                  value:
                    success: true
                    devices_notified: 2
                    users_notified: 1
                    timestamp: 2025-08-12T12:00:00.000Z
                channel_targeted:
                  value:
                    success: true
                    devices_notified: 2
                    users_notified: 1
                    effective_channel_slugs:
                    - devs
                    - ops
                    timestamp: 2025-08-12T12:00:00.000Z
              schema:
                $ref: '#/components/schemas/PushNotificationResponse'
          description: Push notification sent
        "400":
          content:
            application/json:
              examples:
                invalid_target:
                  value:
                    error: Invalid channel targeting
                    message: target.channels must be an array of channel slugs
              schema:
                $ref: '#/components/schemas/BadRequestError'
          description: Bad request (invalid payload or channel targeting input)
        "403":
          content:
            application/json:
              examples:
                channel_scope_violation:
                  value:
                    error: Invalid channel targeting
                    message: This API key can only target assigned channels. Requested
                      channels include channels outside this key scope.
              schema:
                $ref: '#/components/schemas/ForbiddenError'
          description: Forbidden (API key scope or channel assignment violation)
        "404":
          content:
            application/json:
              examples:
                no_devices:
                  value:
                    error: No recipients found
                    message: No devices matched the effective channel target
                    effective_channel_slugs:
                    - marketing
              schema:
                $ref: '#/components/schemas/NoRecipientsError'
          description: No recipients found for effective channel target
        "429":
          content:
            application/json:
              examples:
                rate_limited:
                  value:
                    error: Rate limit exceeded
                    message: "Too many requests, please try again later."
              schema:
                $ref: '#/components/schemas/sendPushNotification_429_response'
          description: Rate limit exceeded
      summary: Send a push notification
      tags:
      - PushNotifications
  /live-activity/start:
    post:
      description: "Starts a Live Activity on devices matched by API key scope and\
        \ optional target channels. For segmented_progress activities, number_of_steps\
        \ can be changed later during update or end calls if the workflow changes."
      operationId: startLiveActivity
      requestBody:
        content:
          application/json:
            examples:
              segmented_progress:
                value:
                  content_state:
                    title: Nightly database backup
                    subtitle: create snapshot
                    number_of_steps: 3
                    current_step: 1
                    type: segmented_progress
                    color: yellow
              progress:
                value:
                  content_state:
                    title: EV Charging
                    subtitle: Added 30 mi range
                    percentage: 15
                    type: progress
                    color: lime
              segmented_progress_channel_targeted:
                value:
                  content_state:
                    title: Nightly database backup
                    subtitle: create snapshot
                    number_of_steps: 3
                    current_step: 1
                    type: segmented_progress
                    color: yellow
                  target:
                    channels:
                    - devs
                    - ops
            schema:
              $ref: '#/components/schemas/LiveActivityStartRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                segmented_progress:
                  value:
                    success: true
                    activity_id: pLAr-Hnq9ZFW4sxlk43Lhbuok4GLh7UW
                    devices_notified: 2
                    users_notified: 1
                    timestamp: 2026-01-28T09:57:22.929Z
                segmented_progress_channel_targeted:
                  value:
                    success: true
                    activity_id: pLAr-Hnq9ZFW4sxlk43Lhbuok4GLh7UW
                    devices_notified: 2
                    users_notified: 1
                    effective_channel_slugs:
                    - devs
                    - ops
                    timestamp: 2026-01-28T09:57:22.929Z
              schema:
                $ref: '#/components/schemas/LiveActivityStartResponse'
          description: Live Activity started
        "400":
          content:
            application/json:
              examples:
                invalid_target:
                  value:
                    error: Invalid channel targeting
                    message: target.channels must be an array of channel slugs
              schema:
                $ref: '#/components/schemas/BadRequestError'
          description: Bad request (invalid payload or channel targeting input)
        "403":
          content:
            application/json:
              examples:
                channel_scope_violation:
                  value:
                    error: Invalid channel targeting
                    message: This API key can only target assigned channels. Requested
                      channels include channels outside this key scope.
              schema:
                $ref: '#/components/schemas/ForbiddenError'
          description: Forbidden (API key scope or channel assignment violation)
        "404":
          content:
            application/json:
              examples:
                no_devices:
                  value:
                    error: No recipients found
                    message: No Live Activity devices matched the effective channel
                      target
                    effective_channel_slugs:
                    - marketing
              schema:
                $ref: '#/components/schemas/NoRecipientsError'
          description: No recipients found for effective channel target
        "429":
          content:
            application/json:
              examples:
                rate_limited:
                  value:
                    error: Rate limit exceeded
                    message: "Too many requests, please try again later."
                concurrent_live_activity_limit_reached:
                  value:
                    error: Live Activity limit reached
                    message: Only 4 concurrent Live Activities are allowed per account
                    limit: 4
                    active: 4
              schema:
                $ref: '#/components/schemas/RateLimitError'
          description: Rate limit exceeded
      summary: Start a Live Activity
      tags:
      - LiveActivities
  /live-activity/update:
    post:
      description: "Updates an existing Live Activity. If the per-activity token is\
        \ not registered yet, the update is queued. For segmented_progress activities,\
        \ you can increase or decrease number_of_steps here as the workflow changes."
      operationId: updateLiveActivity
      requestBody:
        content:
          application/json:
            examples:
              segmented_progress:
                value:
                  activity_id: pLAr-Hnq9ZFW4sxlk43Lhbuok4GLh7UW
                  content_state:
                    title: Nightly database backup
                    subtitle: upload archive
                    number_of_steps: 4
                    current_step: 2
              progress:
                value:
                  activity_id: pLAr-Hnq9ZFW4sxlk43Lhbuok4GLh7UW
                  content_state:
                    title: EV Charging
                    subtitle: Added 120 mi range
                    percentage: 60
            schema:
              $ref: '#/components/schemas/LiveActivityUpdateRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                sent:
                  value:
                    success: true
                    activity_id: pLAr-Hnq9ZFW4sxlk43Lhbuok4GLh7UW
                    devices_notified: 2
                    devices_queued: 0
                    timestamp: 2026-01-28T09:57:26.056Z
              schema:
                $ref: '#/components/schemas/LiveActivityUpdateResponse'
          description: Live Activity updated (or queued)
        "403":
          content:
            application/json:
              examples:
                forbidden:
                  value:
                    error: Forbidden
                    message: This API key cannot update this Live Activity
              schema:
                $ref: '#/components/schemas/ForbiddenError'
          description: Forbidden (activity not owned by this API key account)
        "429":
          content:
            application/json:
              examples:
                rate_limited:
                  value:
                    error: Rate limit exceeded
                    message: "Too many requests, please try again later."
              schema:
                $ref: '#/components/schemas/RateLimitError'
          description: Rate limit exceeded
      summary: Update a Live Activity
      tags:
      - LiveActivities
  /live-activity/end:
    post:
      description: "Ends a Live Activity and archives its lifecycle. For segmented_progress\
        \ activities, you can send the latest number_of_steps here if the workflow\
        \ changed after start."
      operationId: endLiveActivity
      requestBody:
        content:
          application/json:
            examples:
              segmented_progress:
                value:
                  activity_id: pLAr-Hnq9ZFW4sxlk43Lhbuok4GLh7UW
                  content_state:
                    title: Nightly database backup
                    subtitle: verify restore
                    number_of_steps: 4
                    current_step: 4
                    auto_dismiss_minutes: 2
              progress:
                value:
                  activity_id: pLAr-Hnq9ZFW4sxlk43Lhbuok4GLh7UW
                  content_state:
                    title: EV Charging
                    subtitle: Added 200 mi range
                    percentage: 100
                    auto_dismiss_minutes: 2
            schema:
              $ref: '#/components/schemas/LiveActivityEndRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                segmented_progress:
                  value:
                    success: true
                    activity_id: pLAr-Hnq9ZFW4sxlk43Lhbuok4GLh7UW
                    devices_notified: 2
                    devices_queued: 0
                    timestamp: 2026-01-28T09:57:29.258Z
              schema:
                $ref: '#/components/schemas/LiveActivityEndResponse'
          description: Live Activity ended
        "403":
          content:
            application/json:
              examples:
                forbidden:
                  value:
                    error: Forbidden
                    message: This API key cannot end this Live Activity
              schema:
                $ref: '#/components/schemas/ForbiddenError'
          description: Forbidden (activity not owned by this API key account)
        "429":
          content:
            application/json:
              examples:
                rate_limited:
                  value:
                    error: Rate limit exceeded
                    message: "Too many requests, please try again later."
              schema:
                $ref: '#/components/schemas/RateLimitError'
          description: Rate limit exceeded
      summary: End a Live Activity
      tags:
      - LiveActivities
components:
  schemas:
    ContentStateStart:
      additionalProperties: true
      description: "Start payload requires title and type. For segmented_progress\
        \ include number_of_steps and current_step. For progress include percentage\
        \ or value with upper_limit. For segmented_progress, number_of_steps is not\
        \ locked and can be changed in later update or end calls."
      example:
        color: blue
        step_color: lime
        subtitle: subtitle
        percentage: 14.658129805029452
        upper_limit: 5.637376656633329
        title: title
        number_of_steps: 1
        type: segmented_progress
        value: 5.962133916683182
        current_step: 1
      properties:
        title:
          type: string
        subtitle:
          type: string
        number_of_steps:
          description: Total number of steps. Use for type=segmented_progress. This
            value can be increased or decreased later when updating or ending the
            same activity.
          minimum: 1
          type: integer
        current_step:
          description: Current step. Use for type=segmented_progress.
          minimum: 1
          type: integer
        percentage:
          description: Progress percentage (0–100). Use for type=progress. Takes precedence
            over value/upper_limit if both are provided.
          maximum: 100
          minimum: 0
          type: number
        value:
          description: Current progress value. Use with upper_limit for type=progress.
          type: number
        upper_limit:
          description: Maximum progress value. Use with value for type=progress.
          type: number
        type:
          enum:
          - segmented_progress
          - progress
          type: string
        color:
          default: blue
          description: Optional. Accent color for the Live Activity. Defaults to blue.
          enum:
          - lime
          - green
          - cyan
          - blue
          - purple
          - magenta
          - red
          - orange
          - yellow
          type: string
        step_color:
          description: Optional. Overrides color for the current step. Only applies
            to type=segmented_progress.
          enum:
          - lime
          - green
          - cyan
          - blue
          - purple
          - magenta
          - red
          - orange
          - yellow
          type: string
      required:
      - title
      - type
    ContentStateUpdate:
      additionalProperties: true
      description: Update payload requires title. For segmented_progress include current_step
        and optionally number_of_steps. For progress include percentage or value with
        upper_limit. Type is optional when updating an existing activity. You can
        increase or decrease number_of_steps during updates.
      example:
        color: blue
        step_color: lime
        subtitle: subtitle
        percentage: 14.658129805029452
        upper_limit: 5.637376656633329
        title: title
        number_of_steps: 1
        type: segmented_progress
        value: 5.962133916683182
        current_step: 1
      properties:
        title:
          type: string
        subtitle:
          type: string
        number_of_steps:
          description: "Total number of steps. Use for type=segmented_progress. Optional\
            \ on update, and safe to change if the workflow gains or loses steps."
          minimum: 1
          type: integer
        current_step:
          description: Current step. Use for type=segmented_progress.
          minimum: 1
          type: integer
        percentage:
          description: Progress percentage (0–100). Use for type=progress. Takes precedence
            over value/upper_limit if both are provided.
          maximum: 100
          minimum: 0
          type: number
        value:
          description: Current progress value. Use with upper_limit for type=progress.
          type: number
        upper_limit:
          description: Maximum progress value. Use with value for type=progress.
          type: number
        type:
          description: "Optional. When omitted, the API uses the existing Live Activity\
            \ type."
          enum:
          - segmented_progress
          - progress
          type: string
        color:
          default: blue
          description: Optional. Accent color for the Live Activity. Defaults to blue.
          enum:
          - lime
          - green
          - cyan
          - blue
          - purple
          - magenta
          - red
          - orange
          - yellow
          type: string
        step_color:
          description: Optional. Overrides color for the current step. Only applies
            to type=segmented_progress.
          enum:
          - lime
          - green
          - cyan
          - blue
          - purple
          - magenta
          - red
          - orange
          - yellow
          type: string
      required:
      - title
    ContentStateEnd:
      additionalProperties: true
      description: End payload requires title. For segmented_progress include current_step
        and optionally number_of_steps. For progress include percentage or value with
        upper_limit. Type is optional when ending an existing activity. You can send
        an updated number_of_steps here if the workflow changed after start.
      example:
        color: blue
        step_color: lime
        subtitle: subtitle
        percentage: 14.658129805029452
        auto_dismiss_minutes: 0
        upper_limit: 5.637376656633329
        title: title
        number_of_steps: 1
        type: segmented_progress
        value: 5.962133916683182
        current_step: 1
      properties:
        title:
          type: string
        subtitle:
          type: string
        number_of_steps:
          description: "Total number of steps. Use for type=segmented_progress. Optional\
            \ on end, and safe to change if the final workflow used more or fewer\
            \ steps than originally planned."
          minimum: 1
          type: integer
        current_step:
          description: Current step. Use for type=segmented_progress.
          minimum: 1
          type: integer
        percentage:
          description: Progress percentage (0–100). Use for type=progress. Takes precedence
            over value/upper_limit if both are provided.
          maximum: 100
          minimum: 0
          type: number
        value:
          description: Current progress value. Use with upper_limit for type=progress.
          type: number
        upper_limit:
          description: Maximum progress value. Use with value for type=progress.
          type: number
        type:
          description: "Optional. When omitted, the API uses the existing Live Activity\
            \ type."
          enum:
          - segmented_progress
          - progress
          type: string
        color:
          default: blue
          description: Optional. Accent color for the Live Activity. Defaults to blue.
          enum:
          - lime
          - green
          - cyan
          - blue
          - purple
          - magenta
          - red
          - orange
          - yellow
          type: string
        step_color:
          description: Optional. Overrides color for the current step. Only applies
            to type=segmented_progress.
          enum:
          - lime
          - green
          - cyan
          - blue
          - purple
          - magenta
          - red
          - orange
          - yellow
          type: string
        auto_dismiss_minutes:
          default: 3
          description: Optional. Minutes before the ended Live Activity is dismissed.
            Default 3. Set 0 for immediate dismissal. iOS will dismiss ended Live
            Activities after ~4 hours max.
          minimum: 0
          type: integer
      required:
      - title
    AlertPayload:
      additionalProperties: true
      example:
        title: title
        body: body
      properties:
        title:
          type: string
        body:
          type: string
    ChannelTarget:
      additionalProperties: true
      example:
        channels:
        - channels
        - channels
      properties:
        channels:
          description: "Channel slugs. When omitted, API key scope determines recipients."
          items:
            type: string
          minItems: 1
          type: array
      required:
      - channels
    PushNotificationActionType:
      enum:
      - open_url
      - webhook
      type: string
    PushNotificationWebhookMethod:
      default: POST
      enum:
      - GET
      - POST
      type: string
    PushNotificationAction:
      additionalProperties: {}
      example:
        method: POST
        title: title
        type: open_url
        body:
          key: ""
        url: https://openapi-generator.tech
      properties:
        title:
          description: Button title displayed in iOS expanded notification UI.
        type:
          $ref: '#/components/schemas/PushNotificationActionType'
        url:
          description: HTTPS URL. For open_url it is opened in browser. For webhook
            it is called by ActivitySmith backend.
          format: uri
          pattern: ^https://
        method:
          $ref: '#/components/schemas/PushNotificationWebhookMethod'
        body:
          additionalProperties: true
          description: Optional webhook payload body. Used only when type=webhook.
      required:
      - title
      - type
      - url
    PushNotificationRequest:
      additionalProperties: {}
      example:
        badge: 0
        payload:
          key: ""
        subtitle: subtitle
        sound: sound
        title: title
        message: message
        redirection: https://openapi-generator.tech
        actions:
        - method: POST
          title: title
          type: open_url
          body:
            key: ""
          url: https://openapi-generator.tech
        - method: POST
          title: title
          type: open_url
          body:
            key: ""
          url: https://openapi-generator.tech
        - method: POST
          title: title
          type: open_url
          body:
            key: ""
          url: https://openapi-generator.tech
        - method: POST
          title: title
          type: open_url
          body:
            key: ""
          url: https://openapi-generator.tech
        target:
          channels:
          - channels
          - channels
      properties:
        title: {}
        message: {}
        subtitle: {}
        redirection:
          description: Optional HTTPS URL opened when user taps the notification body.
          format: uri
          pattern: ^https://
        actions:
          description: Optional interactive actions shown on iOS long-press.
          items:
            $ref: '#/components/schemas/PushNotificationAction'
          maxItems: 4
        payload:
          additionalProperties: true
        badge: {}
        sound: {}
        target:
          $ref: '#/components/schemas/ChannelTarget'
      required:
      - title
    PushNotificationResponse:
      additionalProperties: true
      example:
        success: true
        users_notified: 6
        devices_notified: 0
        effective_channel_slugs:
        - effective_channel_slugs
        - effective_channel_slugs
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        success:
          type: boolean
        devices_notified:
          type: integer
        users_notified:
          type: integer
        effective_channel_slugs:
          items:
            type: string
          type: array
        timestamp:
          format: date-time
          type: string
      required:
      - success
      - timestamp
    LiveActivityStartRequest:
      additionalProperties: true
      description: Start a new Live Activity. The response includes activity_id for
        later update and end calls.
      example:
        content_state:
          color: blue
          step_color: lime
          subtitle: subtitle
          percentage: 14.658129805029452
          upper_limit: 5.637376656633329
          title: title
          number_of_steps: 1
          type: segmented_progress
          value: 5.962133916683182
          current_step: 1
        alert:
          title: title
          body: body
        target:
          channels:
          - channels
          - channels
      properties:
        content_state:
          $ref: '#/components/schemas/ContentStateStart'
        alert:
          $ref: '#/components/schemas/AlertPayload'
        target:
          $ref: '#/components/schemas/ChannelTarget'
      required:
      - content_state
    LiveActivityStartResponse:
      additionalProperties: true
      description: Returned after a Live Activity starts. Save activity_id and use
        it for all later updates and for the final end call.
      example:
        success: true
        users_notified: 6
        activity_id: activity_id
        devices_notified: 0
        effective_channel_slugs:
        - effective_channel_slugs
        - effective_channel_slugs
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        success:
          type: boolean
        devices_notified:
          type: integer
        users_notified:
          type: integer
        activity_id:
          type: string
        effective_channel_slugs:
          items:
            type: string
          type: array
        timestamp:
          format: date-time
          type: string
      required:
      - activity_id
      - success
      - timestamp
    BadRequestError:
      additionalProperties: true
      example:
        error: error
        message: message
      properties:
        error:
          type: string
        message:
          type: string
      required:
      - error
      - message
    ForbiddenError:
      additionalProperties: true
      example:
        error: error
        message: message
      properties:
        error:
          type: string
        message:
          type: string
      required:
      - error
      - message
    NoRecipientsError:
      additionalProperties: true
      example:
        error: error
        message: message
        effective_channel_slugs:
        - effective_channel_slugs
        - effective_channel_slugs
      properties:
        error:
          type: string
        message:
          type: string
        effective_channel_slugs:
          items:
            type: string
          type: array
      required:
      - error
      - message
    RateLimitError:
      additionalProperties: true
      example:
        error: error
        message: message
      properties:
        error:
          type: string
        message:
          type: string
      required:
      - error
      - message
    LiveActivityLimitError:
      additionalProperties: true
      properties:
        error:
          type: string
        message:
          type: string
        limit:
          type: integer
        active:
          description: Current number of active Live Activities.
          type: integer
      required:
      - active
      - error
      - limit
      - message
    LiveActivityUpdateRequest:
      additionalProperties: true
      description: Update an existing Live Activity by activity_id.
      example:
        content_state:
          color: blue
          step_color: lime
          subtitle: subtitle
          percentage: 14.658129805029452
          upper_limit: 5.637376656633329
          title: title
          number_of_steps: 1
          type: segmented_progress
          value: 5.962133916683182
          current_step: 1
        activity_id: activity_id
      properties:
        activity_id:
          type: string
        content_state:
          $ref: '#/components/schemas/ContentStateUpdate'
      required:
      - activity_id
      - content_state
    LiveActivityUpdateResponse:
      additionalProperties: true
      description: Returned after a Live Activity update is sent or queued.
      example:
        devices_queued: 0
        success: true
        activity_id: activity_id
        devices_notified: 6
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        success:
          type: boolean
        activity_id:
          type: string
        devices_queued:
          type: integer
